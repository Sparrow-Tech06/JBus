<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,shrink-to-fit=no,viewport-fit=cover">
  
  <title> JBus: Find your bus </title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

  <link href="css/global.css" rel="stylesheet">
  <link href="css/home.css" rel="stylesheet">
  
  <!-- preload this image -->
  <link rel="preload" as="image" href="Assets/hero-img.png">
  
</head>
<body>

<!-- Header -->
<header>
  <!-- Navbar -->
<nav class="navbar shadow-sm sticky-top">
    <div class="container d-flex justify-content-between align-items-center">
      
      <!-- Left Side -->
      <div>
        <div class="d-flex align-items-center">
          <button class="btn text-white p-0 me-3 toggle-btn" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasNav">
            <i class="bi bi-list"></i>
          </button>
          <a class="navbar-brand" href="#"><i class="bi bi-bus-front-fill me-1"></i> JBus</a>
        </div>
        <div class="district">
          <i class="bi bi-geo-alt-fill text-warning"></i> Jhargram District
        </div>
      </div>

      <!-- Right Side: Notification -->
      <div>
        <a onclick="window.location.href='notifications/notifications.html';" class="notification-icon">
          <i class="bi bi-bell-fill"></i>
        </a>
      </div>
    </div>
  </nav>

  <!-- Offcanvas Menu -->
  <div class="offcanvas offcanvas-start" tabindex="-1" id="offcanvasNav">
    <div class="offcanvas-header">
      <h5 class="offcanvas-title"><i class="bi bi-menu-button-wide me-2"></i> Menu</h5>
      <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body p-0">
      <ul class="nav flex-column">
        
        <li class="nav-item border-bottom">
          <a class="nav-link py-3" onclick="window.location.href='testing/index.html';">
            <i class="bi bi-ticket-detailed me-2"></i> Book a bus
          </a>
        </li>
        <li class="nav-item border-bottom">
          <a class="nav-link py-3" onclick="window.location.href='Debug.html';">
            <i class="bi bi-exclamation-circle me-2"></i> Report a Issue
          </a>
        </li>
        <li class="nav-item border-bottom">
          <a class="nav-link py-3" onclick="window.location.href='Support/report-issue.html';">
            <i class="bi bi-exclamation-circle me-2"></i> Report a Issue
          </a>
        </li>
        <li class="nav-item border-bottom">
          <a class="nav-link py-3" onclick="window.location.href='Support/lost-found.html';">
            <i class="bi bi-search me-2"></i> Lost & Found Items
          </a>
        </li>
        <li class="nav-item border-bottom">
          <a class="nav-link py-3" onclick="window.location.href='demo/index.html';">
            <i class="bi bi-bus-front me-2"></i> Suggest a feature
          </a>
        </li>
        <li class="nav-item border-bottom">
          <a class="nav-link py-3" onclick="window.location.href='testing/index.html';">
            <i class="bi bi-headset me-2"></i> Support
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link py-3" onclick="window.location.href='my_data/index.html';">
            <i class="bi bi-info-circle me-2"></i> About us
          </a>
        </li>
      </ul>
    </div>
  </div>

</header>

<!-- Main Content -->
<main class="container mb-4">
  <!-- Search Box -->
  <section class="search-box">
  <form id="searchForm" class="card mx-auto">
    <div class="mb-3">
      <label class="form-label"> <i class="bi bi-geo-alt me-2"></i> From </label>
      <input type="text" id="fromInput" class="form-control" onpaste="return false" oncopy="return false" oncut="return false" placeholder="Enter departure location" list="stopsList">
      <div id="fromNotFound" class="notfound">Not found, try another</div>
    </div>
    <div class="mb-3">
      <label class="form-label"> <i class="bi bi-geo me-2"></i>To </label>
      <input type="text" id="toInput" class="form-control" onpaste="return false" oncopy="return false" oncut="return false" placeholder="Enter destination" list="stopsList">
      <div id="toNotFound" class="notfound">Not found, try another</div>
    </div>
    <div class="mb-3">
      <label class="form-label"> <i class="bi bi-upc-scan me-2"></i> Search by Bus No</label>
      <input type="text" id="busNoInput" class="form-control" onpaste="return false" oncopy="return false" oncut="return false" placeholder="Enter bus no">
    </div>
    <datalist id="stopsList"></datalist>
    <button type="submit" class="btn search-btn w-100"> Search </button>
  </form>
  </section>
  
</main>

  
<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

 <script>
    let allStops = [];

    // fetch bus stops from buses.json
    fetch("my_data/buses.json")
      .then(res => res.json())
      .then(data => {
        const buses = data.buses;
        let stopsSet = new Set();
        buses.forEach(bus => {
          bus.stops.forEach(s => stopsSet.add(s.name));
        });
        allStops = Array.from(stopsSet);
      });

    function updateSuggestions(inputId, notFoundId) {
      const input = document.getElementById(inputId);
      const notFound = document.getElementById(notFoundId);
      const datalist = document.getElementById("stopsList");

      input.addEventListener("input", e => {
        const val = e.target.value.trim().toLowerCase();

        if (val.length < 2) {
          datalist.innerHTML = "";
          notFound.style.display = "none";
          return;
        }

        const matches = allStops.filter(stop => stop.toLowerCase().includes(val));

        if (matches.length === 0) {
          notFound.style.display = "block";
          datalist.innerHTML = "";
        } else {
          notFound.style.display = "none";
          datalist.innerHTML = matches.map(stop => `<option value="${stop}">`).join("");
        }
      });
    }

    updateSuggestions("fromInput", "fromNotFound");
    updateSuggestions("toInput", "toNotFound");

    document.getElementById("searchForm").addEventListener("submit", e => {
      e.preventDefault();
      const from = document.getElementById("fromInput").value.trim();
      const to = document.getElementById("toInput").value.trim();
      const busNo = document.getElementById("busNoInput").value.trim();

      if (busNo) {
        window.location.href = `my_data/bus.html?busNo=${encodeURIComponent(busNo)}`;
      } else if (from && to) {
        window.location.href = `my_data/results.html?from=${encodeURIComponent(from)}&to=${encodeURIComponent(to)}`;
      }
    });
  </script>
  
</body>
</html>
