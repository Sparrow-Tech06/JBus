<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,shrink-to-fit=no,viewport-fit=cover">  
  <title> JBus: Find your bus </title>  
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet"> 
  
  <link href="css/global.css" rel="stylesheet">
  <link href="css/home.css" rel="stylesheet">  
  
</head>
<body>
  <header>
  <nav class="navbar">
    <div class="container d-flex justify-content-between align-items-center"><div>
    <div class="d-flex align-items-center">
      <button class="btn text-white p-0 me-3" data-bs-toggle="offcanvas" data-bs-target="#offcanvasNav">
        <i class="bi bi-list"></i>
      </button>
      <a class="navbar-brand" href="#"><i class="bi bi-bus-front-fill me-1"></i> JBus</a>
    </div>
    <div class="district">
      <i class="bi bi-geo-alt-fill text-warning"></i> Jhargram District
    </div>
  </div>

  <a onclick="location.href='notifications/notifications.html'" class="notification-icon">
    <i class="bi bi-bell-fill"></i>
  </a>
</div>

  </nav>  <aside class="offcanvas offcanvas-start" tabindex="-1" id="offcanvasNav">
    <div class="offcanvas-header">
      <h5 class="offcanvas-title"><i class="bi bi-menu-button-wide me-2"></i> Menu</h5>
      <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
    </div>
    <nav class="offcanvas-body p-0">
      <ul id="menuList" class="nav flex-column"></ul>
    </nav>
  </aside>
</header>
  
<main class="container my-4">
  <section class="search-box">
    <form id="searchForm" class="card mx-auto"><div class="mb-3">
    <label class="form-label"><i class="bi bi-geo-alt me-2"></i> From</label>
    <input type="text" id="fromInput" class="form-control" placeholder="Enter departure location" list="stopsList">
    <div id="fromNotFound" class="notfound">Not found, try another</div>
  </div>

  <div class="mb-3">
    <label class="form-label"><i class="bi bi-geo me-2"></i> To</label>
    <input type="text" id="toInput" class="form-control" placeholder="Enter destination" list="stopsList">
    <div id="toNotFound" class="notfound">Not found, try another</div>
  </div>

  <div class="mb-3">
    <label class="form-label"><i class="bi bi-upc-scan me-2"></i> Search by Bus No</label>
    <input type="text" id="busNoInput" class="form-control" placeholder="Enter bus no">
  </div>

  <datalist id="stopsList"></datalist>
  <button type="submit" class="btn search-btn w-100">Search</button>
</form>

  </section>
</main><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><script>
// =====================
// Sidebar (Data Driven)
// =====================
const menuItems = [
  { icon: "bi-ticket-detailed", text: "Book a bus", link: "testing/index.html" },
  { icon: "bi-exclamation-circle", text: "Report a Issue", link: "Debug.html" },
  { icon: "bi-exclamation-circle", text: "Report a Issue", link: "Support/report-issue.html" },
  { icon: "bi-search", text: "Lost & Found Items", link: "Support/lost-found.html" },
  { icon: "bi-bus-front", text: "Suggest a feature", link: "demo/index.html" },
  { icon: "bi-headset", text: "Support", link: "testing/index.html" },
  { icon: "bi-info-circle", text: "About us", link: "my_data/index.html" }
];

menuList.innerHTML = menuItems.map((item, i) => `
  <li class="nav-item ${i !== menuItems.length - 1 ? 'border-bottom' : ''}">
    <a class="nav-link py-3" onclick="location.href='${item.link}'">
      <i class="bi ${item.icon} me-2"></i> ${item.text}
    </a>
  </li>
`).join("");

// =====================
// Data Fetch + Cache
// =====================
let allStops = [];

(async () => {
  try {
    const cached = sessionStorage.getItem("stops");
    if (cached) {
      allStops = JSON.parse(cached);
      return;
    }

    const res = await fetch("my_data/buses.json");
    const { buses } = await res.json();

    const set = new Set();
    buses.forEach(b => b.stops.forEach(s => set.add(s.name)));

    allStops = [...set];
    sessionStorage.setItem("stops", JSON.stringify(allStops));
  } catch (e) {
    console.error("Stops load failed", e);
  }
})();

// =====================
// Debounce Utility
// =====================
const debounce = (fn, delay = 250) => {
  let t;
  return (...args) => {
    clearTimeout(t);
    t = setTimeout(() => fn(...args), delay);
  };
};

// =====================
// Smart Suggestion Engine
// =====================
const datalist = document.getElementById("stopsList");

const handleSearch = (input, notFound) => {
  const val = input.value.trim().toLowerCase();

  if (val.length < 2) {
    datalist.innerHTML = "";
    notFound.style.display = "none";
    return;
  }

  // limit results (virtualization-lite)
  const matches = [];
  for (let i = 0; i < allStops.length; i++) {
    const s = allStops[i];
    if (s.toLowerCase().includes(val)) {
      matches.push(s);
      if (matches.length >= 20) break;
    }
  }

  notFound.style.display = matches.length ? "none" : "block";
  datalist.innerHTML = matches.map(s => `<option value="${s}">`).join("");
};

// Attach with debounce
const bindInput = (inputId, notFoundId) => {
  const input = document.getElementById(inputId);
  const notFound = document.getElementById(notFoundId);

  input.addEventListener("input", debounce(() => handleSearch(input, notFound), 200));
};

bindInput("fromInput", "fromNotFound");
bindInput("toInput", "toNotFound");

// =====================
// Form Submit
// =====================
searchForm.addEventListener("submit", e => {
  e.preventDefault();

  const from = fromInput.value.trim();
  const to = toInput.value.trim();
  const busNo = busNoInput.value.trim();

  if (busNo) {
    location.href = `my_data/bus.html?busNo=${encodeURIComponent(busNo)}`;
  } else if (from && to) {
    location.href = `my_data/results.html?from=${encodeURIComponent(from)}&to=${encodeURIComponent(to)}`;
  }
});
</script></body>
</html>
