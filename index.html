<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>JBus: Find your bus</title>  
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet"> 

  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/home.css">
    
</head><body>
<div id="app"><!-- Navbar --><nav class="navbar shadow-sm sticky-top bg-white">
  <div class="container d-flex justify-content-between align-items-center"><div>
  <div class="d-flex align-items-center">
    <button class="btn p-0 me-3" data-bs-toggle="offcanvas" data-bs-target="#offcanvasNav">
      <i class="bi bi-list"></i>
    </button>
    <span class="navbar-brand"><i class="bi bi-bus-front-fill me-1"></i> JBus</span>
  </div>
  <div class="text-muted small">
    <i class="bi bi-geo-alt-fill text-warning"></i> Jhargram District
  </div>
</div>

<a href="notifications/notifications.html">
  <i class="bi bi-bell-fill"></i>
</a>

  </div>
</nav><!-- Sidebar --><div class="offcanvas offcanvas-start" id="offcanvasNav">
  <div class="offcanvas-header">
    <h5><i class="bi bi-menu-button-wide me-2"></i> Menu</h5>
    <button class="btn-close" data-bs-dismiss="offcanvas"></button>
  </div>  <div class="offcanvas-body p-0">
    <ul class="nav flex-column">
      <li v-for="item in menuItems" class="nav-item border-bottom">
        <a class="nav-link py-3" :href="item.link">
          <i :class="'bi ' + item.icon + ' me-2'"></i>{{ item.text }}
        </a>
      </li>
    </ul>
  </div>
</div><!-- Main --><main class="container mt-4">  <form @submit.prevent="submitForm" class="card p-3"><div v-if="isLoading" class="text-center text-muted mb-2">
  <i class="bi bi-arrow-repeat spin"></i> Loading bus stops...
</div>

<div class="mb-3">
  <label class="form-label">From</label>
  <input type="text" v-model="from" @input="filterStops('from')" list="stopsList" class="form-control">
  <div v-if="showNotFoundFrom" class="notfound">Not found, try another</div>
</div>

<div class="mb-3">
  <label class="form-label">To</label>
  <input type="text" v-model="to" @input="filterStops('to')" list="stopsList" class="form-control">
  <div v-if="showNotFoundTo" class="notfound">Not found, try another</div>
</div>

<div class="mb-3">
  <label class="form-label">Bus No</label>
  <input type="text" v-model="busNo" class="form-control">
</div>

<datalist id="stopsList">
  <option v-for="stop in filteredStops" :value="stop"></option>
</datalist>

<button class="btn btn-primary w-100">Search</button>

  </form></main></div><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><script src="https://unpkg.com/vue@3/dist/vue.global.js"></script><script>
const { createApp } = Vue;

createApp({
  data() {
    return {
      allStops: [],
      filteredStops: [],
      isLoading: true,

      menuItems: [
        { icon: "bi-ticket-detailed", text: "Book a bus", link: "testing/index.html" },
        { icon: "bi-exclamation-circle", text: "Report an Issue", link: "Support/report-issue.html" },
        { icon: "bi-search", text: "Lost & Found Items", link: "Support/lost-found.html" },
        { icon: "bi-bus-front", text: "Suggest a feature", link: "demo/index.html" },
        { icon: "bi-headset", text: "Support", link: "testing/index.html" },
        { icon: "bi-info-circle", text: "About us", link: "my_data/index.html" }
      ],

      from: "",
      to: "",
      busNo: "",
      showNotFoundFrom: false,
      showNotFoundTo: false
    }
  },

  mounted() {
    this.fetchStops();
  },

  methods: {
    async fetchStops() {
      try {
        const res = await fetch("my_data/buses.json");
        const data = await res.json();

        let set = new Set();
        data.buses.forEach(bus => {
          bus.stops.forEach(s => set.add(s.name));
        });

        this.allStops = [...set];
      } catch(e) {
        console.error(e);
      } finally {
        this.isLoading = false;
      }
    },

    filterStops(type) {
      let value = type === 'from' ? this.from : this.to;

      if (value.length < 2) {
        this.filteredStops = [];
        this.showNotFoundFrom = false;
        this.showNotFoundTo = false;
        return;
      }

      let matches = this.allStops.filter(s => s.toLowerCase().includes(value.toLowerCase()));
      this.filteredStops = matches;

      if(type==='from') this.showNotFoundFrom = matches.length===0;
      if(type==='to') this.showNotFoundTo = matches.length===0;
    },

    submitForm() {
      if (this.busNo) {
        window.location.href = `my_data/bus.html?busNo=${encodeURIComponent(this.busNo)}`;
      } else if (this.from && this.to) {
        window.location.href = `my_data/results.html?from=${encodeURIComponent(this.from)}&to=${encodeURIComponent(this.to)}`;
      }
    }
  }
}).mount('#app');
</script></body>
</html>
