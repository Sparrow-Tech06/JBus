<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>JBus - Find Your Bus</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<link rel="stylesheet" href="css/global.css">
<link rel="stylesheet" href="css/home.css">
  
</head>

<body>

<header class="navbar">
  <div class="container d-flex justify-content-between">
    <div class="d-flex align-items-center gap-2">
      <i class="bi bi-bus-front-fill"></i>
      <span class="navbar-brand">JBus</span>
    </div>
    <i class="bi bi-bell-fill"></i>
  </div>
</header>

<aside class="offcanvas offcanvas-start" tabindex="-1" id="offcanvasNav">
    <div class="offcanvas-header">
      <h5 class="offcanvas-title"><i class="bi bi-menu-button-wide me-2"></i> Menu</h5>
      <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
    </div>
    <nav class="offcanvas-body p-0">
      <ul id="menuList" class="nav flex-column"></ul>
    </nav>
</aside>

<div class="container">
  <div class="search-card">

    <form id="form">

      <!-- FROM -->
      <div class="mb-3 input-group-wrap">
        <label class="form-label">From</label>
        <input id="from" class="form-control" placeholder="Enter location">
        <div id="fromBox" class="suggestion-box"></div>
        <div id="fromNF" class="notfound">Not found</div>
      </div>

      <!-- TO -->
      <div class="mb-3 input-group-wrap">
        <label class="form-label">To</label>
        <input id="to" class="form-control" placeholder="Enter destination">
        <div id="toBox" class="suggestion-box"></div>
        <div id="toNF" class="notfound">Not found</div>
      </div>

      <!-- SWAP -->
      <button type="button" class="swap-btn" onclick="swap()">
        <i class="bi bi-arrow-down-up"></i>
      </button>

      <!-- BUS -->
      <div class="mb-3">
        <label class="form-label">Bus No</label>
        <input id="bus" class="form-control" placeholder="Optional">
      </div>

      <button class="search-btn w-100">Search</button>

    </form>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
// =====================
// MOCK DATA (replace JSON)
// =====================
let allStops = [];

(async()=>{
  const cached = sessionStorage.getItem("stops");
  if(cached){
    allStops = JSON.parse(cached);
    return;
  }

  const res = await fetch("my_data/buses.json");
  const data = await res.json();

  const set = new Set();
  data.buses.forEach(b=>b.stops.forEach(s=>set.add(s.name)));

  allStops = [...set];
  sessionStorage.setItem("stops",JSON.stringify(allStops));
})();

// =====================
// DEBOUNCE
// =====================
const debounce=(fn,d=200)=>{
  let t; return(...a)=>{clearTimeout(t); t=setTimeout(()=>fn(...a),d)}
}

// =====================
// SEARCH ENGINE
// =====================
function search(input,box,nf){
  const val=input.value.toLowerCase().trim();

  if(val.length<2){
    box.style.display="none";
    nf.style.display="none";
    return;
  }

  const result = allStops.filter(s=>s.toLowerCase().includes(val)).slice(0,15);

  if(result.length===0){
    nf.style.display="block";
    box.style.display="none";
    return;
  }

  nf.style.display="none";

  box.innerHTML = result.map(s=>`
    <div class="suggestion-item" onclick="select('${input.id}','${s}')">
      <i class="bi bi-geo-alt"></i> ${s}
    </div>
  `).join("");

  box.style.display="block";
}

function select(id,val){
  document.getElementById(id).value=val;
  document.getElementById(id+"Box").style.display="none";
}

// =====================
// BIND
// =====================
function bind(id){
  const input=document.getElementById(id);
  const box=document.getElementById(id+"Box");
  const nf=document.getElementById(id+"NF");

  input.addEventListener("input",debounce(()=>search(input,box,nf)));

  document.addEventListener("click",e=>{
    if(!input.contains(e.target) && !box.contains(e.target)){
      box.style.display="none";
    }
  });
}

bind("from");
bind("to");

// =====================
// SWAP
// =====================
function swap(){
  const f=from.value;
  from.value=to.value;
  to.value=f;
}

// =====================
// SUBMIT
// =====================
form.addEventListener("submit",e=>{
  e.preventDefault();

  const f=from.value.trim();
  const t=to.value.trim();
  const b=bus.value.trim();

  if(b){
    location.href=`my_data/bus.html?busNo=${encodeURIComponent(b)}`;
  }else if(f && t){
    location.href=`my_data/results.html?from=${encodeURIComponent(f)}&to=${encodeURIComponent(t)}`;
  }
});
</script>

</body>
</html>
