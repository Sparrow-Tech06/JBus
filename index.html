<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>JBus</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<link href="css/global.css" rel="stylesheet">
<link href="css/home.css" rel="stylesheet">

<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>

<body>

<header class="navbar">
  <div class="container d-flex justify-content-between">
    <i class="bi bi-bus-front-fill"></i>
    <span>JBus</span>
    <i class="bi bi-bell-fill"></i>
  </div>
</header>

<div id="app" class="container mt-3">

  <div class="search-card">

    <form @submit.prevent="submitForm">

      <!-- DISTRICT -->
      <div class="mb-3">
        <label>District</label>
        <select v-model="district" class="form-select" @change="loadData">
          <option disabled value="">Select District</option>
          <option v-for="d in districts">{{ d }}</option>
        </select>
      </div>

      <!-- FROM / TO -->
      <div class="row g-2">

        <div class="col-5">
          <input v-model="from" @input="filterStops('from')" placeholder="From" class="form-control">

          <div v-if="showFrom" class="suggestion-box">
            <div v-for="s in fromList" @click="select('from',s)" class="suggestion-item">
              {{ s }}
            </div>
          </div>
        </div>

        <div class="col-2 text-center">
          <button type="button" @click="swap" class="btn btn-light w-100">⇄</button>
        </div>

        <div class="col-5">
          <input v-model="to" @input="filterStops('to')" placeholder="To" class="form-control">

          <div v-if="showTo" class="suggestion-box">
            <div v-for="s in toList" @click="select('to',s)" class="suggestion-item">
              {{ s }}
            </div>
          </div>
        </div>

      </div>

      <!-- BUS -->
      <input v-model="bus" class="form-control mt-3" placeholder="Bus No">

      <button class="btn btn-primary w-100 mt-3">Search</button>

    </form>

  </div>

</div>

<script src="js/app.js"></script>

</body>
</html>
