<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>JBus - Find Your Bus</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<link rel="stylesheet" href="css/global.css">
  
<style>

/* CARD */
.search-card{
  margin-top:30px;
  background:#fff;
  border-radius:20px;
  padding:18px;
  box-shadow:0 10px 25px rgba(0,0,0,.08);
}

/* INPUT */
.form-control{
  border-radius:12px;
  padding:12px;
}
.form-control:focus{
  border-color:var(--primary);
  box-shadow:0 0 0 3px rgba(53,105,185,.15);
}

/* BUTTON */
.search-btn{
  background:linear-gradient(135deg,#3569b9,#4c7ed6);
  border:none;
  padding:12px;
  border-radius:12px;
  color:#fff;
  font-weight:600;
}

/* SUGGESTION */
.input-group-wrap{position:relative;}

.suggestion-box{
  position:absolute;
  width:100%;
  top:100%;
  background:#fff;
  border-radius:12px;
  box-shadow:0 10px 25px rgba(0,0,0,.1);
  max-height:220px;
  overflow-y:auto;
  z-index:999;
  display:none;
}

.suggestion-item{
  padding:12px;
  cursor:pointer;
  border-bottom:1px solid #eee;
}
.suggestion-item:hover{
  background:#f1f5fb;
}

.notfound{
  font-size:12px;
  color:red;
  display:none;
}

/* SMALL UX */
.swap-btn{
  position:absolute;
  right:10px;
  top:38px;
  border:none;
  background:#fff;
  border-radius:50%;
  width:36px;
  height:36px;
  box-shadow:0 4px 10px rgba(0,0,0,.1);
}
</style>
</head>

<body>

<nav class="navbar">
  <div class="container d-flex justify-content-between">
    <div class="d-flex align-items-center gap-2">
      <i class="bi bi-bus-front-fill"></i>
      <span class="navbar-brand">JBus</span>
    </div>
    <i class="bi bi-bell-fill"></i>
  </div>
</nav>

<div class="container">
  <div class="search-card">

    <form id="form">

      <!-- FROM -->
      <div class="mb-3 input-group-wrap">
        <label class="form-label">From</label>
        <input id="from" class="form-control" placeholder="Enter location">
        <div id="fromBox" class="suggestion-box"></div>
        <div id="fromNF" class="notfound">Not found</div>
      </div>

      <!-- TO -->
      <div class="mb-3 input-group-wrap">
        <label class="form-label">To</label>
        <input id="to" class="form-control" placeholder="Enter destination">
        <div id="toBox" class="suggestion-box"></div>
        <div id="toNF" class="notfound">Not found</div>
      </div>

      <!-- SWAP -->
      <button type="button" class="swap-btn" onclick="swap()">
        <i class="bi bi-arrow-down-up"></i>
      </button>

      <!-- BUS -->
      <div class="mb-3">
        <label class="form-label">Bus No</label>
        <input id="bus" class="form-control" placeholder="Optional">
      </div>

      <button class="search-btn w-100">Search</button>

    </form>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
// =====================
// MOCK DATA (replace JSON)
// =====================
let allStops = [];

(async()=>{
  const cached = sessionStorage.getItem("stops");
  if(cached){
    allStops = JSON.parse(cached);
    return;
  }

  const res = await fetch("my_data/buses.json");
  const data = await res.json();

  const set = new Set();
  data.buses.forEach(b=>b.stops.forEach(s=>set.add(s.name)));

  allStops = [...set];
  sessionStorage.setItem("stops",JSON.stringify(allStops));
})();

// =====================
// DEBOUNCE
// =====================
const debounce=(fn,d=200)=>{
  let t; return(...a)=>{clearTimeout(t); t=setTimeout(()=>fn(...a),d)}
}

// =====================
// SEARCH ENGINE
// =====================
function search(input,box,nf){
  const val=input.value.toLowerCase().trim();

  if(val.length<2){
    box.style.display="none";
    nf.style.display="none";
    return;
  }

  const result = allStops.filter(s=>s.toLowerCase().includes(val)).slice(0,15);

  if(result.length===0){
    nf.style.display="block";
    box.style.display="none";
    return;
  }

  nf.style.display="none";

  box.innerHTML = result.map(s=>`
    <div class="suggestion-item" onclick="select('${input.id}','${s}')">
      <i class="bi bi-geo-alt"></i> ${s}
    </div>
  `).join("");

  box.style.display="block";
}

function select(id,val){
  document.getElementById(id).value=val;
  document.getElementById(id+"Box").style.display="none";
}

// =====================
// BIND
// =====================
function bind(id){
  const input=document.getElementById(id);
  const box=document.getElementById(id+"Box");
  const nf=document.getElementById(id+"NF");

  input.addEventListener("input",debounce(()=>search(input,box,nf)));

  document.addEventListener("click",e=>{
    if(!input.contains(e.target) && !box.contains(e.target)){
      box.style.display="none";
    }
  });
}

bind("from");
bind("to");

// =====================
// SWAP
// =====================
function swap(){
  const f=from.value;
  from.value=to.value;
  to.value=f;
}

// =====================
// SUBMIT
// =====================
form.addEventListener("submit",e=>{
  e.preventDefault();

  const f=from.value.trim();
  const t=to.value.trim();
  const b=bus.value.trim();

  if(b){
    location.href=`my_data/bus.html?busNo=${encodeURIComponent(b)}`;
  }else if(f && t){
    location.href=`my_data/results.html?from=${encodeURIComponent(f)}&to=${encodeURIComponent(t)}`;
  }
});
</script>

</body>
</html>
