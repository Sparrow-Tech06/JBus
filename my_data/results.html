<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Bus Results</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<style>

:root{
  --primary:#2563eb;
  --text:#111827;
  --muted:#6b7280;
  --border:#eceff3;
  --bg:#f5f7fb;
  --card:#ffffff;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

body{
  background:var(--bg);
  font-family:system-ui;
  color:var(--text);
  padding-bottom:30px;
}

/* HEADER */

.topbar{
  position:sticky;
  top:0;
  z-index:1000;
  background:#ffffffee;
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border);
  padding:14px 16px;
}

.page-title{
  font-size:19px;
  font-weight:700;
}

.route-info{
  font-size:13px;
  color:var(--muted);
  margin-top:2px;
}

/* RESULTS */

#results{
  padding:12px;
}

/* CARD */

.bus-card{
  background:var(--card);
  border-radius:18px;
  padding:12px;
  margin-bottom:12px;
  border:1px solid var(--border);

  display:flex;
  gap:12px;
  align-items:flex-start;

  transition:.2s;
  cursor:pointer;
}

.bus-card:active{
  transform:scale(.985);
}

/* IMAGE */

.bus-image{
  width:72px;
  height:72px;
  border-radius:14px;
  object-fit:cover;
  background:#f1f1f1;
  flex-shrink:0;
}

/* CONTENT */

.bus-name{
  font-size:15px;
  font-weight:700;
  margin-bottom:2px;
}

.bus-route{
  font-size:13px;
  color:var(--muted);
  margin-bottom:10px;
}

/* STATUS */

.status{
  display:inline-flex;
  align-items:center;
  gap:5px;

  font-size:11px;
  font-weight:600;

  padding:4px 9px;
  border-radius:999px;

  margin-bottom:8px;
}

.running{
  background:#eef7f1;
  color:#1f8b4c;
}

.cancelled{
  background:#fff0f0;
  color:#d63c3c;
}

/* BOTTOM */

.bottom-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.arrival{
  display:flex;
  align-items:center;
  gap:8px;
}

.arrival-icon{
  width:34px;
  height:34px;
  border-radius:10px;
  background:#eff5ff;

  display:flex;
  align-items:center;
  justify-content:center;

  color:var(--primary);
}

.arrival-text small{
  display:block;
  color:var(--muted);
  font-size:11px;
}

.arrival-text strong{
  font-size:14px;
}

.arrow{
  color:#9ca3af;
  font-size:18px;
}

/* MODAL */

.modal-content{
  border:none;
}

.modal-header{
  border-bottom:1px solid var(--border);
}

.modal-title{
  font-size:17px;
  font-weight:700;
}

.route-top{
  padding:14px 16px;
  border-bottom:1px solid var(--border);
  font-size:14px;
  color:var(--muted);
}

/* STOPS */

.stop-item{
  display:flex;
  gap:12px;
  padding:14px 16px;
  position:relative;
}

.stop-item:not(:last-child)::after{
  content:"";
  position:absolute;
  left:32px;
  top:48px;
  width:2px;
  height:100%;
  background:#e5e7eb;
}

.stop-icon{
  width:32px;
  height:32px;
  border-radius:50%;
  background:#eff5ff;

  color:var(--primary);

  display:flex;
  align-items:center;
  justify-content:center;

  flex-shrink:0;
  z-index:2;
}

.stop-time{
  font-size:14px;
  font-weight:700;
}

.stop-name{
  font-size:13px;
  color:var(--muted);
  margin-top:2px;
}

/* SKELETON */

.skeleton{
  background:linear-gradient(
  90deg,
  #f1f1f1 25%,
  #e7e7e7 37%,
  #f1f1f1 63%
  );

  background-size:400% 100%;
  animation:loading 1.2s infinite;

  height:100px;
  border-radius:18px;
  margin-bottom:12px;
}

@keyframes loading{
  0%{background-position:100% 50%;}
  100%{background-position:0 50%;}
}

</style>
</head>

<body>

<!-- TOPBAR -->

<div class="topbar">

  <div class="page-title">
    Available Buses
  </div>

  <div class="route-info" id="routeInfo">
    Loading...
  </div>

</div>

<!-- RESULTS -->

<div id="results">

  <div class="skeleton"></div>
  <div class="skeleton"></div>
  <div class="skeleton"></div>

</div>

<!-- MODAL -->

<div class="modal fade" id="routeModal" tabindex="-1">

  <div class="modal-dialog modal-fullscreen">

    <div class="modal-content">

      <div class="modal-header">

        <h5 class="modal-title"
        id="routeModalLabel"></h5>

        <button
        type="button"
        class="btn-close"
        data-bs-dismiss="modal"></button>

      </div>

      <div class="route-top"
      id="routeTop"></div>

      <div id="routeContent"></div>

    </div>

  </div>

</div>

<script>

const params =
new URLSearchParams(window.location.search);

const from = params.get("from");
const to = params.get("to");

document.getElementById("routeInfo")
.innerHTML = `${from} → ${to}`;

fetch("buses.json")

.then(res => res.json())

.then(data => {

  let buses = data.buses;

  buses = buses.filter(bus => {

    const stops = bus.stops.map(
      s => s.name.toLowerCase()
    );

    const fromIndex =
    stops.indexOf(from.toLowerCase());

    const toIndex =
    stops.indexOf(to.toLowerCase());

    return (
      fromIndex !== -1 &&
      toIndex !== -1 &&
      fromIndex < toIndex
    );

  });

  const resultsDiv =
  document.getElementById("results");

  if(!buses.length){

    resultsDiv.innerHTML = `

      <div class="text-center py-5">

        <i class="bi bi-bus-front"
        style="
        font-size:55px;
        color:#cbd5e1;"></i>

        <h5 class="mt-3">
          No buses found
        </h5>

        <p class="text-muted small">
          No buses available for this route
        </p>

      </div>

    `;

    return;
  }

  resultsDiv.innerHTML = buses.map((bus,index)=>{

    const fromStop = bus.stops.find(
      s => s.name.toLowerCase()
      === from.toLowerCase()
    );

    const arrivalTime =
    fromStop ? fromStop.time : "--";

    return `

    <div class="bus-card"
    onclick="openRoute(${index})">

      <img src="${bus.image}"
      class="bus-image"
      draggable="false">

      <div class="flex-grow-1">

        <div class="
        status
        ${bus.isCancelled
        ? 'cancelled'
        : 'running'}">

          <i class="bi
          ${bus.isCancelled
          ? 'bi-x-circle-fill'
          : 'bi-check-circle-fill'}"></i>

          ${bus.isCancelled
          ? 'Not Running'
          : 'Running Today'}

        </div>

        <div class="bus-name">
          ${bus.name}
        </div>

        <div class="bus-route">
          ${bus.no} •
          ${bus.from} → ${bus.to}
        </div>

        <div class="bottom-row">

          <div class="arrival">

            <div class="arrival-icon">
              <i class="bi bi-clock"></i>
            </div>

            <div class="arrival-text">

              <small>
                Arrival at ${from}
              </small>

              <strong>
                ${arrivalTime}
              </strong>

            </div>

          </div>

          <i class="bi bi-chevron-right arrow"></i>

        </div>

      </div>

    </div>

    `;

  }).join("");

  window.openRoute = function(index){

    const bus = buses[index];

    routeModalLabel.innerHTML =
    `${bus.name} (${bus.no})`;

    routeTop.innerHTML =
    `${bus.from} → ${bus.to}`;

    routeContent.innerHTML =

    bus.stops.map(stop => `

      <div class="stop-item">

        <div class="stop-icon">
          <i class="bi bi-geo-alt-fill"></i>
        </div>

        <div>

          <div class="stop-time">
            ${stop.time}
          </div>

          <div class="stop-name">
            ${stop.name}
          </div>

        </div>

      </div>

    `).join("");

    new bootstrap.Modal(routeModal)
    .show();

  }

});

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
