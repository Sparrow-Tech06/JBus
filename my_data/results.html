<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Bus Results</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<link rel="stylesheet" href="../css/result.css">

</head>

<body>

<!-- TOPBAR -->

<div class="topbar">

  <div class="page-title">
    Available Buses
  </div>

  <div class="route-info" id="routeInfo">
    Loading...
  </div>

</div>

<!-- RESULTS -->

<div id="results">

  <div class="skeleton"></div>
  <div class="skeleton"></div>
  <div class="skeleton"></div>

</div>

<!-- MODAL -->

<div class="modal fade" id="routeModal" tabindex="-1">

  <div class="modal-dialog modal-fullscreen">

    <div class="modal-content">

      <div class="modal-header">

        <h5 class="modal-title"
        id="routeModalLabel"></h5>

        <button
        type="button"
        class="btn-close"
        data-bs-dismiss="modal"></button>

      </div>

      <div class="route-top"
      id="routeTop"></div>

      <div id="routeContent"></div>

    </div>

  </div>

</div>

<script>

const params =
new URLSearchParams(window.location.search);

const from = params.get("from");
const to = params.get("to");

document.getElementById("routeInfo")
.innerHTML = `${from} → ${to}`;

fetch("buses.json")

.then(res => res.json())

.then(data => {

  let buses = data.buses;

  buses = buses.filter(bus => {

    const stops = bus.stops.map(
      s => s.name.toLowerCase()
    );

    const fromIndex =
    stops.indexOf(from.toLowerCase());

    const toIndex =
    stops.indexOf(to.toLowerCase());

    return (
      fromIndex !== -1 &&
      toIndex !== -1 &&
      fromIndex < toIndex
    );

  });

  const resultsDiv =
  document.getElementById("results");

  if(!buses.length){

    resultsDiv.innerHTML = `

      <div class="text-center py-5">

        <i class="bi bi-bus-front"
        style="
        font-size:55px;
        color:#cbd5e1;"></i>

        <h5 class="mt-3">
          No buses found
        </h5>

        <p class="text-muted small">
          No buses available for this route
        </p>

      </div>

    `;

    return;
  }

  resultsDiv.innerHTML = buses.map((bus,index)=>{

    const fromStop = bus.stops.find(
      s => s.name.toLowerCase()
      === from.toLowerCase()
    );

    const arrivalTime =
    fromStop ? fromStop.time : "--";

    return `

    <div class="bus-card"
    onclick="openRoute(${index})">

      <img src="${bus.image}"
      class="bus-image"
      draggable="false">

      <div class="flex-grow-1">

        <div class="
        status
        ${bus.isCancelled
        ? 'cancelled'
        : 'running'}">

          <i class="bi
          ${bus.isCancelled
          ? 'bi-x-circle-fill'
          : 'bi-check-circle-fill'}"></i>

          ${bus.isCancelled
          ? 'Not Running'
          : 'Running Today'}

        </div>

        <div class="bus-name">
          ${bus.name}
        </div>

        <div class="bus-route">
          ${bus.no} •
          ${bus.from} → ${bus.to}
        </div>

        <div class="bottom-row">

          <div class="arrival">

            <div class="arrival-icon">
              <i class="bi bi-clock"></i>
            </div>

            <div class="arrival-text">

              <small>
                Arrival at ${from}
              </small>

              <strong>
                ${arrivalTime}
              </strong>

            </div>

          </div>

          <i class="bi bi-chevron-right arrow"></i>

        </div>

      </div>

    </div>

    `;

  }).join("");

  window.openRoute = function(index){

    const bus = buses[index];

    routeModalLabel.innerHTML =
    `${bus.name} (${bus.no})`;

    routeTop.innerHTML =
    `${bus.from} → ${bus.to}`;

    routeContent.innerHTML =

    bus.stops.map(stop => `

      <div class="stop-item">

        <div class="stop-icon">
          <i class="bi bi-geo-alt-fill"></i>
        </div>

        <div>

          <div class="stop-time">
            ${stop.time}
          </div>

          <div class="stop-name">
            ${stop.name}
          </div>

        </div>

      </div>

    `).join("");

    new bootstrap.Modal(routeModal)
    .show();

  }

});

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
