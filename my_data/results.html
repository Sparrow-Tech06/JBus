
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<title>Bus Results</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<style>

:root{
  --primary:#3569b9;
  --primary-light:#edf4ff;
  --bg:#f5f7fb;
  --text:#111827;
  --muted:#6b7280;
  --border:#edf1f7;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  user-select:none;
  -webkit-tap-highlight-color:transparent;
}

body{
  background:var(--bg);
  font-family:system-ui;
  color:var(--text);
  padding-bottom:40px;
}

/* HEADER */

.topbar{
  position:sticky;
  top:0;
  z-index:1000;
  background:#ffffffcc;
  backdrop-filter:blur(12px);
  padding:14px 16px;
  border-bottom:1px solid var(--border);
}

.top-title{
  font-size:20px;
  font-weight:700;
}

.route-chip{
  background:var(--primary-light);
  color:var(--primary);
  padding:7px 12px;
  border-radius:999px;
  font-size:13px;
  font-weight:600;
}

/* RESULTS */

#results{
  padding:14px;
}

/* CARD */

.bus-card{
  position:relative;
  display:flex;
  gap:12px;
  padding:12px;
  margin-bottom:12px;
  border-radius:22px;
  background:#fff;
  overflow:hidden;
  border:1px solid var(--border);
  box-shadow:
  0 2px 8px rgba(0,0,0,.03);

  transition:.25s;
  cursor:pointer;
}

.bus-card:active{
  transform:scale(.985);
}

.bus-card::before{
  content:"";
  position:absolute;
  left:0;
  top:0;
  width:5px;
  height:100%;
  background:var(--primary);
}

/* IMAGE */

.bus-image{
  width:76px;
  height:76px;
  border-radius:18px;
  object-fit:cover;
  flex-shrink:0;
  background:#f2f2f2;
}

/* CONTENT */

.bus-name{
  font-size:16px;
  font-weight:700;
  margin-bottom:2px;
}

.bus-route{
  font-size:13px;
  color:var(--muted);
  margin-bottom:8px;
}

/* STATUS */

.status{
  display:inline-flex;
  align-items:center;
  gap:5px;
  font-size:11px;
  font-weight:700;
  padding:5px 10px;
  border-radius:999px;
  margin-bottom:8px;
}

.running{
  background:#e9f8ef;
  color:#1e9e55;
}

.cancelled{
  background:#ffecec;
  color:#df3b3b;
}

/* ARRIVAL */

.arrival-box{
  display:flex;
  align-items:center;
  justify-content:space-between;
  background:#f7faff;
  border-radius:14px;
  padding:10px 12px;
}

.arrival-left{
  display:flex;
  align-items:center;
  gap:10px;
}

.clock{
  width:38px;
  height:38px;
  border-radius:12px;
  background:#eaf2ff;
  color:var(--primary);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
}

.arrival-text small{
  display:block;
  color:var(--muted);
  font-size:11px;
}

.arrival-text strong{
  font-size:15px;
}

.arrow-icon{
  color:var(--primary);
  font-size:18px;
}

/* MODAL */

.modal-content{
  border:none;
  border-radius:0;
}

.modal-header{
  background:#fff;
  border-bottom:1px solid var(--border);
}

.modal-title{
  font-weight:700;
}

.route-top{
  padding:18px;
  background:#fff;
  border-bottom:1px solid var(--border);
}

.route-badge{
  background:var(--primary-light);
  color:var(--primary);
  padding:8px 14px;
  border-radius:999px;
  font-weight:700;
  font-size:13px;
}

.timeline{
  position:relative;
  margin-left:12px;
}

.timeline::before{
  content:"";
  position:absolute;
  left:16px;
  top:0;
  bottom:0;
  width:2px;
  background:#d9e4f8;
}

.stop-item{
  position:relative;
  display:flex;
  gap:14px;
  padding:14px 0;
}

.stop-dot{
  width:34px;
  height:34px;
  border-radius:50%;
  background:#3569b9;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
  z-index:2;
  font-size:13px;
}

.stop-content{
  background:#fff;
  border-radius:16px;
  padding:12px;
  flex-grow:1;
  border:1px solid var(--border);
}

.stop-time{
  color:var(--primary);
  font-weight:700;
  font-size:15px;
}

.stop-name{
  font-size:14px;
  margin-top:2px;
}

/* SKELETON */

.skeleton{
  animation:pulse 1.2s infinite;
  background:linear-gradient(
  90deg,
  #f2f2f2 25%,
  #e9e9e9 37%,
  #f2f2f2 63%
  );
  background-size:400% 100%;
}

@keyframes pulse{
  0%{background-position:100% 50%;}
  100%{background-position:0 50%;}
}

.skeleton-card{
  height:110px;
  border-radius:22px;
  margin-bottom:12px;
}

</style>
</head>

<body>

<!-- HEADER -->

<div class="topbar d-flex justify-content-between align-items-center">

  <div class="top-title">
    Available Buses
  </div>

  <div class="route-chip" id="routeChip">
    Loading...
  </div>

</div>

<!-- RESULTS -->

<div id="results">

  <!-- Skeleton -->
  <div class="skeleton skeleton-card"></div>
  <div class="skeleton skeleton-card"></div>
  <div class="skeleton skeleton-card"></div>

</div>

<!-- MODAL -->

<div class="modal fade" id="routeModal" tabindex="-1">

  <div class="modal-dialog modal-fullscreen">

    <div class="modal-content">

      <div class="modal-header">

        <h5 class="modal-title" id="routeModalLabel"></h5>

        <button
        type="button"
        class="btn-close"
        data-bs-dismiss="modal"></button>

      </div>

      <div class="modal-body p-0">

        <div class="route-top text-center">

          <div class="route-badge" id="routeBadge"></div>

        </div>

        <div class="p-3" id="routeContent"></div>

      </div>

    </div>

  </div>

</div>

<script>

const params = new URLSearchParams(window.location.search);

const from = params.get("from");
const to = params.get("to");

document.getElementById("routeChip").innerHTML =
`${from} → ${to}`;

fetch("buses.json")

.then(res => res.json())

.then(data => {

  let buses = data.buses;

  buses = buses.filter(bus => {

    const stops = bus.stops.map(
      s => s.name.toLowerCase()
    );

    const fromIndex =
    stops.indexOf(from.toLowerCase());

    const toIndex =
    stops.indexOf(to.toLowerCase());

    return (
      fromIndex !== -1 &&
      toIndex !== -1 &&
      fromIndex < toIndex
    );

  });

  const resultsDiv =
  document.getElementById("results");

  if(!buses.length){

    resultsDiv.innerHTML = `
      <div class="text-center mt-5">
        <i class="bi bi-bus-front"
        style="font-size:60px;color:#c6d4ea"></i>

        <h5 class="mt-3">
          No buses found
        </h5>

        <p class="text-muted">
          No buses available from
          ${from} to ${to}
        </p>
      </div>
    `;

    return;
  }

  resultsDiv.innerHTML = buses.map((bus,idx)=>{

    const fromStop = bus.stops.find(
      s => s.name.toLowerCase()
      === from.toLowerCase()
    );

    const arrivalTime =
    fromStop ? fromStop.time : "--";

    return `

    <div class="bus-card"
    onclick="openRoute(${idx})">

      <img src="${bus.image}"
      class="bus-image"
      draggable="false">

      <div class="flex-grow-1">

        <div class="
        status
        ${bus.isCancelled
        ? 'cancelled'
        : 'running'}">

          <i class="bi
          ${bus.isCancelled
          ? 'bi-x-circle-fill'
          : 'bi-check-circle-fill'}"></i>

          ${bus.isCancelled
          ? 'Not Running Today'
          : 'Running Today'}

        </div>

        <div class="bus-name">
          ${bus.name}
        </div>

        <div class="bus-route">
          ${bus.no} • ${bus.from}
          → ${bus.to}
        </div>

        <div class="arrival-box">

          <div class="arrival-left">

            <div class="clock">
              <i class="bi bi-clock"></i>
            </div>

            <div class="arrival-text">

              <small>
                Arrival at ${from}
              </small>

              <strong>
                ${arrivalTime}
              </strong>

            </div>

          </div>

          <i class="bi bi-chevron-right
          arrow-icon"></i>

        </div>

      </div>

    </div>

    `;

  }).join("");

  window.openRoute = function(index){

    const bus = buses[index];

    routeModalLabel.innerHTML =
    `${bus.name} (${bus.no})`;

    routeBadge.innerHTML =
    `${bus.from} → ${bus.to}`;

    routeContent.innerHTML = `

      <div class="timeline">

        ${bus.stops.map(stop => `

        <div class="stop-item">

          <div class="stop-dot">
            <i class="bi bi-geo-alt-fill"></i>
          </div>

          <div class="stop-content">

            <div class="stop-time">
              ${stop.time}
            </div>

            <div class="stop-name">
              ${stop.name}
            </div>

          </div>

        </div>

        `).join("")}

      </div>

    `;

    new bootstrap.Modal(routeModal).show();

  }

});

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
